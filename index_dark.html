<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon VPN — Dark Edition 🌙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_dark.css">
</head>
<body>
    <div id="sparkles"></div>

    <!-- САМОЛЕТ С ОГНЯМИ -->
    <div class="plane-container">
        <svg width="120" height="40" viewBox="0 0 120 40" fill="none">
            <path d="M10 20 C10 15, 30 15, 80 15 C100 15, 115 17, 115 20 C115 23, 100 25, 80 25 C30 25, 10 25, 10 20 Z" fill="#1e293b" />
            <path d="M15 20 L5 10 L25 20 Z" fill="#0f172a" />
            <path d="M50 20 L75 35 L90 35 L70 20 Z" fill="#334155" />
            <path d="M50 20 L65 8 L80 8 L65 20 Z" fill="#0f172a" />
            <!-- Навигационные огни -->
            <circle cx="90" cy="35" r="2" fill="#ef4444">
                <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
            </circle>
            <circle cx="80" cy="8" r="2" fill="#22c55e">
                <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite" />
            </circle>
        </svg>
    </div>

    <div id="root"></div>

    <script type="module">
        import { h, Component, render } from 'https://esm.sh/preact';
        import { useState, useEffect } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';
        const html = htm.bind(h);

        const Mountains = () => html`
            <svg class="mountain-scene" viewBox="0 0 1200 400" preserveAspectRatio="none">
                <!-- Неоновое свечение за горами -->
                <path fill="#f97316" opacity="0.1" d="M0,400 L150,200 L300,320 L500,100 L750,280 L900,150 L1200,400 Z" />
                <path fill="#020617" d="M0,400 L150,200 L300,320 L500,100 L750,280 L900,150 L1200,400 Z" stroke="#fb923c" stroke-width="1" />
                <path fill="#0f172a" d="M-100,400 L200,250 L450,350 L700,180 L950,300 L1100,200 L1300,400 Z" stroke="#f472b6" stroke-width="0.5" />
            </svg>
        `;

        function App() {
            const [view, setView] = useState('landing');
            const [authMode, setAuthMode] = useState('login');
            const [isLogged, setIsLogged] = useState(false);

            useEffect(() => {
                // Звезды
                const container = document.getElementById('sparkles');
                for(let i=0; i<40; i++) {
                    const s = document.createElement('div');
                    s.className = 'sparkle';
                    s.style.left = Math.random() * 100 + 'vw';
                    s.style.top = Math.random() * 100 + 'vh';
                    s.style.width = s.style.height = Math.random() * 3 + 'px';
                    s.style.animationDelay = Math.random() * 15 + 's';
                    container.appendChild(s);
                }

                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('visible');
                    });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, [view]);

            return html`
                <div class="app-container">
                    <nav class="navbar">
                        <div class="logo">HORIZON 🌙</div>
                        <div class="nav-links">
                            <a class="nav-link" onClick=${() => {setView('landing'); window.scrollTo(0,0);}}>Главная</a>
                            <a class="nav-link" href="#features">Преимущества</a>
                            <a class="nav-link" href="#pricing">Тарифы</a>
                        </div>
                        <div class="nav-actions">
                            ${!isLogged ? html`
                                <button class="btn-reg" style="background:none; border: 1px solid var(--border); color: #fff; margin-right:15px" onClick=${() => {setView('auth'); setAuthMode('login');}}>Войти</button>
                                <button class="btn-reg" onClick=${() => {setView('auth'); setAuthMode('register');}}>Регистрация</button>
                            ` : html`
                                <button class="btn-reg" onClick=${() => setView('dashboard')}>Личный кабинет</button>
                            `}
                        </div>
                    </nav>

                    <${Mountains} />

                    <main>
                        ${view === 'landing' && html`
                            <div>
                                <section class="hero reveal">
                                    <h1 class="hero-title">Свобода в ритме <br/> ночного горизонта.</h1>
                                    <p style="color: var(--text-secondary); font-size: 1.3rem; max-width: 650px; margin-bottom: 3.5rem;">Самый быстрый VPN для тех, кто не спит. Безопасность и анонимность в одно касание.</p>
                                    <button class="btn-reg" onClick=${() => {setView('auth'); setAuthMode('register');}}>Попробовать Dark Mode</button>
                                </section>

                                <section id="features" class="section">
                                    <h2 class="section-title reveal">Твои преимущества 💎</h2>
                                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2.5rem;">
                                        <div class="glass-panel reveal" style="padding: 0; overflow: hidden;">
                                            <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=600&h=400&q=80" style="width:100%; height:200px; object-fit:cover; opacity: 0.8;" />
                                            <div style="padding: 2.5rem; text-align: center;">
                                                <h3>Скорость 10 Гбит/с</h3>
                                                <p style="color: var(--text-secondary); margin-top: 10px">Наши серверы никогда не спят. Стабильный поток в любое время суток.</p>
                                            </div>
                                        </div>
                                        <div class="glass-panel reveal" style="padding: 0; overflow: hidden;">
                                            <img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?auto=format&fit=crop&w=600&h=400&q=80" style="width:100%; height:200px; object-fit:cover; opacity: 0.8;" />
                                            <div style="padding: 2.5rem; text-align: center;">
                                                <h3>Анонимный доступ</h3>
                                                <p style="color: var(--text-secondary); margin-top: 10px">Теневые протоколы делают твою активность невидимой для провайдеров.</p>
                                            </div>
                                        </div>
                                    </div>
                                </section>

                                <section id="pricing" class="section">
                                    <h2 class="section-title reveal">Выбери свой уровень</h2>
                                    <div class="price-grid">
                                        <div class="price-card reveal">
                                            <h3>ТЕСТ 24ч</h3>
                                            <div class="price-tag">0 ₽</div>
                                            <button class="btn-reg" style="width: 100%" onClick=${() => {setView('auth'); setAuthMode('register');}}>Начать</button>
                                        </div>
                                        <div class="price-card reveal" style="border: 2px solid var(--accent); background: rgba(249, 115, 22, 0.05);">
                                            <h3 style="color: var(--accent)">МЕСЯЦ</h3>
                                            <div class="price-tag">250 ₽</div>
                                            <button class="btn-reg" style="width: 100%" onClick=${() => {setView('auth'); setAuthMode('register');}}>Выбрать Премиум</button>
                                        </div>
                                        <div class="price-card reveal">
                                            <h3>ГОД ✨</h3>
                                            <div class="price-tag">1990 ₽</div>
                                            <button class="btn-reg" style="width: 100%" onClick=${() => {setView('auth'); setAuthMode('register');}}>Получить выгоду</button>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        `}

                        ${view === 'auth' && html`
                            <section class="reveal" style="max-width: 450px; margin: 10vh auto; padding: 3rem; background: var(--glass); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);">
                                <h2 style="text-align: center;">${authMode === 'login' ? 'Вход' : 'Регистрация'}</h2>
                                <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 2rem;">
                                    <input type="email" placeholder="Email" style="padding: 1.2rem; border-radius: 20px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; outline: none;" />
                                    <input type="password" placeholder="Пароль" style="padding: 1.2rem; border-radius: 20px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; outline: none;" />
                                    <button class="btn-reg" onClick=${() => {setIsLogged(true); setView('dashboard');}}>
                                        ${authMode === 'login' ? 'Войти' : 'Создать аккаунт'}
                                    </button>
                                    <div style="text-align: center; color: var(--accent); font-weight: 800; cursor: pointer;" onClick=${() => setAuthMode(authMode === 'login' ? 'register' : 'login')}>
                                        ${authMode === 'login' ? 'Регистрация' : 'Уже есть аккаунт?'}
                                    </div>
                                </div>
                            </section>
                        `}
                    </main>

                    <footer style="padding: 60px; text-align: center; color: var(--text-secondary); border-top: 1px solid rgba(255,255,255,0.05);">
                        © 2024 Horizon Dark Edition. Почувствуй свободу ночи. 🌙
                    </footer>
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
